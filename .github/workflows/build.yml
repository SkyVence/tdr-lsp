name: Build LSP

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: win32-x64
            ext: .exe
          - os: ubuntu-latest
            artifact_name: linux-x64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure and Build
        uses: threeal/cmake-action@v1
        with:
          source-dir: .
          build-dir: build
          options: CMAKE_BUILD_TYPE=Release
          run-build: true
          build-args: --target tdr-lsp

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p release/${{ matrix.artifact_name }}
          ls
          ls build
          cp build/Release/tdr-lsp.exe release/${{ matrix.artifact_name }}/

      - name: Prepare artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release/${{ matrix.artifact_name }}
          cp build/tdr-lsp release/${{ matrix.artifact_name }}/
          chmod +x release/${{ matrix.artifact_name }}/tdr-lsp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tdr-lsp-${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
