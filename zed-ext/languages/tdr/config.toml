name = "TDR Scene"
grammar = "tdr"
path_suffixes = ["tdr", "traceurs-de-rayons", "paf"]
line_comments = ["//"]
tab_size = 2
hard_tabs = false
brackets = [
  { start = "<", end = ">", close = true, newline = false },
  { start = "\"", end = "\"", close = true, newline = false },
  { start = "'", end = "'", close = true, newline = false }
]
initial_indent = "none"
folds = "tree"
